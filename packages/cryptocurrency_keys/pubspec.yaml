name: cryptocurrency_keys
description: Cryptocurrency keys package
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  bip32: ^2.0.0
  bip39:
    git:
      url: git@github.com:hawkbee1/bip39.git
      ref: master
  crypto_keys: ^0.3.0+1
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  json_annotation: ^4.9.0

dependency_overrides:
  pointycastle: ^4.0.0 # a library that implements popular crypto algorithms

dev_dependencies:
  build_runner: ^2.4.11
  flutter_test:
    sdk: flutter
  json_serializable: ^6.7.0
  very_good_analysis: ^5.0.0+1
